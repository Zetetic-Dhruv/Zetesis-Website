# Cloudflare Worker for Decision Engineering Platform.
#
# Deploy flow:
#   cd studio-worker
#   npx wrangler d1 create zetesis_decision_manifold_studio
#   # paste the returned database_id below
#   npx wrangler d1 migrations apply zetesis_decision_manifold_studio --remote
#   npx wrangler secret put OPENAI_API_KEY
#   npx wrangler deploy
#
# The Worker owns account auth, class-code registration, D1 persistence,
# OpenAI calls, and report artifacts.

name = "zetesislabs-decision-manifold-studio"
main = "src/studio.js"
compatibility_date = "2026-01-01"
account_id = "75a11ac71fbcc3ddc793675245c3d95b"
workers_dev = false

[vars]
OPENAI_MODEL = "gpt-5.4-mini"
OPENAI_HIGH_QUALITY_MODEL = "gpt-5.5"
OPENAI_HIGH_QUALITY_REASONING_EFFORT = "low"
# Set to "fixture" for localhost/offline testing where deterministic,
# source-grounded behavior substitutes for the external LLM API.
AGENT_API_MODE = "openai"
DEFAULT_CLASS_ID = "class_bethany_house_2026"
DEFAULT_ENGAGEMENT_ID = "eng_bethany_house_2026"
STUDENT_USAGE_LIMIT_MICROS = "10000000"
ESTIMATED_CALL_COST_MICROS = "50000"
MODEL_INPUT_USD_PER_MILLION_TOKENS = "0.75"
MODEL_OUTPUT_USD_PER_MILLION_TOKENS = "4.50"
HIGH_QUALITY_MODEL_INPUT_USD_PER_MILLION_TOKENS = "5.00"
HIGH_QUALITY_MODEL_OUTPUT_USD_PER_MILLION_TOKENS = "30.00"
HIGH_QUALITY_ESTIMATED_CALL_COST_MICROS = "150000"

[[d1_databases]]
binding = "STUDIO_DB"
database_name = "zetesis_decision_manifold_studio"
database_id = "f2a11649-1aa6-4656-81f4-bde7d1b45d91"

[[routes]]
pattern = "zetesislabs.com/studio*"
zone_id = "e18a1fe40e3f82d744a62612ebf3f0f2"

[[routes]]
pattern = "zetesislabs.com/decision-engineering*"
zone_id = "e18a1fe40e3f82d744a62612ebf3f0f2"

[[routes]]
pattern = "zetesislabs.com/api/studio*"
zone_id = "e18a1fe40e3f82d744a62612ebf3f0f2"

[[routes]]
pattern = "platform.zetesislabs.com/*"
zone_id = "e18a1fe40e3f82d744a62612ebf3f0f2"

[[routes]]
pattern = "instructor.platform.zetesislabs.com"
custom_domain = true
